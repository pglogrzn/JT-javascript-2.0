<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cafeteria</title>
  <link rel="stylesheet" href="./style2.css">
</head>
<body>
  <h1>CAFETERÍA</h1>

  <section class="productos">
    <article class="producto" data-nombre="Postre 1" data-precio="5000">
      <img src="./img/OIP (1).webp" alt="Postre 1">
      <h3>Postre 1</h3>
      <p>$ 12000</p>
      <button>Comprar</button>
    </article>
    <article class="producto" data-nombre="Postre 1" data-precio="9000">
      <img src="./img/OIP (2).webp" alt="Postre 2">
      <h3>Postre 2</h3>
      <p>$ 19000</p>
      <button>Comprar</button>
    </article>
    <article class="producto" data-nombre="Postre 3" data-precio="2000">
      <img src="./img/OIP (3).webp" alt="Postre 3">
      <h3>Postre 3</h3>
      <p>$ 20000</p>
      <button>Comprar</button>
    </article>
    <article class="producto" data-nombre="Postre 4" data-precio="5000">
      <img src="./img/OIP (4).webp" alt="Postre 4">
      <h3>Postre 4</h3>
      <p>$ 50000</p>
      <button>Comprar</button>
    </article>
    <article class="producto" data-nombre="Postre 5" data-precio="4000">
      <img src="./img/OIP.webp" alt="Postre 5">
      <h3>Postre 5</h3>
      <p>$ 14000</p>
      <button>Comprar</button>
    </article>
    <article class="producto" data-nombre="Postre 6" data-precio="3500">
      <img src="./img/cheescake.jpg" alt="Postre 6">
      <h3>Postre 6</h3>
      <p>$ 35000</p>
      <button>Comprar</button>
    </article>
  </section>

  <section class="carrito">
    <h2>Carrito de compras</h2>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Item</th>
          <th>Cantidad</th>
          <th>Acción</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="5">Carrito vacío - comience a comprar!</td>
        </tr>
      </tbody>
    </table>
    <h3 id="totalGeneral">Total: $0</h3>
  </section>
  <script src="./codigos2.js"></script>
</body>
</html>
